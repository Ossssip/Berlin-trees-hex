name: Pipeline

on:
  schedule:
    - cron: '0 3 * * 1'   # Every Monday 03:00 UTC
  push:
    branches: [main]
    paths:
      - 'pipeline/**'
      - 'dbt/**'
      - 'data/checksums.json'
      - '.github/workflows/pipeline.yml'
  workflow_dispatch:

permissions:
  contents: write   # push checksums commit + upload release assets
  pages: write      # deploy to GitHub Pages
  id-token: write   # OIDC token for Pages deployment

jobs:

  # ── Job 1: lightweight WFS count check ──────────────────────────────────────
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check.outputs.needs_update }}
      count_alkis_ortsteile: ${{ steps.check.outputs.count_alkis_ortsteile }}
      count_baumbestand_anlagen: ${{ steps.check.outputs.count_baumbestand_anlagen }}
      count_baumbestand_strassen: ${{ steps.check.outputs.count_baumbestand_strassen }}
      count_gruen_berlin: ${{ steps.check.outputs.count_gruen_berlin }}
      count_forstbetriebskarte: ${{ steps.check.outputs.count_forstbetriebskarte }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests pyyaml

      - name: Check WFS sources
        id: check
        run: |
          set +e
          python pipeline/check_updates.py
          CODE=$?
          set -e
          if [ $CODE -eq 2 ]; then
            echo "::error::WFS check returned an error or suspicious count — aborting"
            exit 2
          fi
          echo "needs_update=$([ $CODE -eq 1 ] && echo true || echo false)" >> $GITHUB_OUTPUT

  # ── Job 2: full pipeline ─────────────────────────────────────────────────────
  run-pipeline:
    needs: check-updates
    if: needs.check-updates.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install -r requirements-ci.txt

      - name: Install tippecanoe (felt fork)
        run: |
          sudo apt-get install -y gcc g++ make libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          cd /tmp/tippecanoe && make -j$(nproc) && sudo make install
          tippecanoe --version

      - name: Install pmtiles CLI
        run: |
          curl -sL https://github.com/protomaps/go-pmtiles/releases/download/v1.30.2/go-pmtiles_1.30.2_Linux_x86_64.tar.gz \
            | sudo tar xz -C /usr/local/bin pmtiles
          pmtiles version

      # ── Per-source raw data: restore from cache or fetch fresh ──────────────

      - name: Restore raw — alkis_ortsteile
        id: cache-alkis
        uses: actions/cache@v4
        with:
          path: data/raw/alkis_ortsteile.parquet
          key: wfs-alkis_ortsteile-${{ needs.check-updates.outputs.count_alkis_ortsteile }}

      - name: Restore checkpoint — alkis_ortsteile
        if: steps.cache-alkis.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: data/raw/alkis_ortsteile.partial.parquet
          key: wfs-alkis_ortsteile-${{ needs.check-updates.outputs.count_alkis_ortsteile }}-partial

      - name: Fetch alkis_ortsteile
        id: fetch-alkis
        if: steps.cache-alkis.outputs.cache-hit != 'true'
        run: python pipeline/fetch_wfs.py --source alkis_ortsteile

      - name: Save checkpoint — alkis_ortsteile
        if: always() && steps.fetch-alkis.outcome == 'failure'
        uses: actions/cache/save@v4
        with:
          path: data/raw/alkis_ortsteile.partial.parquet
          key: wfs-alkis_ortsteile-${{ needs.check-updates.outputs.count_alkis_ortsteile }}-partial

      - name: Restore raw — baumbestand_anlagen
        id: cache-anlagen
        uses: actions/cache@v4
        with:
          path: data/raw/baumbestand_anlagen.parquet
          key: wfs-baumbestand_anlagen-${{ needs.check-updates.outputs.count_baumbestand_anlagen }}

      - name: Restore checkpoint — baumbestand_anlagen
        if: steps.cache-anlagen.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: data/raw/baumbestand_anlagen.partial.parquet
          key: wfs-baumbestand_anlagen-${{ needs.check-updates.outputs.count_baumbestand_anlagen }}-partial

      - name: Fetch baumbestand_anlagen
        id: fetch-anlagen
        if: steps.cache-anlagen.outputs.cache-hit != 'true'
        run: python pipeline/fetch_wfs.py --source baumbestand_anlagen

      - name: Save checkpoint — baumbestand_anlagen
        if: always() && steps.fetch-anlagen.outcome == 'failure'
        uses: actions/cache/save@v4
        with:
          path: data/raw/baumbestand_anlagen.partial.parquet
          key: wfs-baumbestand_anlagen-${{ needs.check-updates.outputs.count_baumbestand_anlagen }}-partial

      - name: Restore raw — baumbestand_strassen
        id: cache-strassen
        uses: actions/cache@v4
        with:
          path: data/raw/baumbestand_strassen.parquet
          key: wfs-baumbestand_strassen-${{ needs.check-updates.outputs.count_baumbestand_strassen }}

      - name: Restore checkpoint — baumbestand_strassen
        if: steps.cache-strassen.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: data/raw/baumbestand_strassen.partial.parquet
          key: wfs-baumbestand_strassen-${{ needs.check-updates.outputs.count_baumbestand_strassen }}-partial

      - name: Fetch baumbestand_strassen
        id: fetch-strassen
        if: steps.cache-strassen.outputs.cache-hit != 'true'
        run: python pipeline/fetch_wfs.py --source baumbestand_strassen

      - name: Save checkpoint — baumbestand_strassen
        if: always() && steps.fetch-strassen.outcome == 'failure'
        uses: actions/cache/save@v4
        with:
          path: data/raw/baumbestand_strassen.partial.parquet
          key: wfs-baumbestand_strassen-${{ needs.check-updates.outputs.count_baumbestand_strassen }}-partial

      - name: Restore raw — gruen_berlin
        id: cache-gruen
        uses: actions/cache@v4
        with:
          path: data/raw/gruen_berlin.parquet
          key: wfs-gruen_berlin-${{ needs.check-updates.outputs.count_gruen_berlin }}

      - name: Restore checkpoint — gruen_berlin
        if: steps.cache-gruen.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: data/raw/gruen_berlin.partial.parquet
          key: wfs-gruen_berlin-${{ needs.check-updates.outputs.count_gruen_berlin }}-partial

      - name: Fetch gruen_berlin
        id: fetch-gruen
        if: steps.cache-gruen.outputs.cache-hit != 'true'
        run: python pipeline/fetch_wfs.py --source gruen_berlin

      - name: Save checkpoint — gruen_berlin
        if: always() && steps.fetch-gruen.outcome == 'failure'
        uses: actions/cache/save@v4
        with:
          path: data/raw/gruen_berlin.partial.parquet
          key: wfs-gruen_berlin-${{ needs.check-updates.outputs.count_gruen_berlin }}-partial

      - name: Restore raw — forstbetriebskarte
        id: cache-forst
        uses: actions/cache@v4
        with:
          path: data/raw/forstbetriebskarte.parquet
          key: wfs-forstbetriebskarte-${{ needs.check-updates.outputs.count_forstbetriebskarte }}

      - name: Restore checkpoint — forstbetriebskarte
        if: steps.cache-forst.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: data/raw/forstbetriebskarte.partial.parquet
          key: wfs-forstbetriebskarte-${{ needs.check-updates.outputs.count_forstbetriebskarte }}-partial

      - name: Fetch forstbetriebskarte
        id: fetch-forst
        if: steps.cache-forst.outputs.cache-hit != 'true'
        run: python pipeline/fetch_wfs.py --source forstbetriebskarte

      - name: Save checkpoint — forstbetriebskarte
        if: always() && steps.fetch-forst.outcome == 'failure'
        uses: actions/cache/save@v4
        with:
          path: data/raw/forstbetriebskarte.partial.parquet
          key: wfs-forstbetriebskarte-${{ needs.check-updates.outputs.count_forstbetriebskarte }}-partial

      # ── Transform → Aggregate → Build tiles ─────────────────────────────────

      - name: Transform
        run: |
          python pipeline/init_db.py
          dbt run --profiles-dir ./dbt --project-dir ./dbt
          dbt test --profiles-dir ./dbt --project-dir ./dbt
          python pipeline/export_trees.py

      - name: Aggregate
        run: python pipeline/aggregate_all.py

      - name: Build tiles
        run: python pipeline/build_tiles.py

      # ── Commit, release, deploy ──────────────────────────────────────────────

      - name: Update checksums
        run: python pipeline/check_updates.py --update

      - name: Commit checksums
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/checksums.json
          git diff --staged --quiet || git commit -m "chore: update checksums after pipeline run [skip ci]"
          git push

      - name: Create data-latest release if it does not exist
        run: |
          gh release view data-latest 2>/dev/null || gh release create data-latest \
            --title "Data (latest)" \
            --notes "PMTiles archive, updated automatically by the weekly pipeline CI run." \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PMTiles to release
        run: gh release upload data-latest web/public/berlin_trees.pmtiles --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload web/ for deploy job
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: web/
          retention-days: 1

  # ── Job 3: GitHub Pages deploy ───────────────────────────────────────────────
  deploy:
    needs: run-pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web
          path: web/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/

      - id: deployment
        uses: actions/deploy-pages@v4
